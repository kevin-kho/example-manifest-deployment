apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # If application is deleted, resource itself is deleted
  # finalizers:
  # - resources-finalizer.argocd.argoproj.io
  name: example-manifest
  namespace: argocd
spec:
  destination:
    namespace: argocd # where the child app manifests will be created/applied
    name: in-cluster
  project: default
  source:
    path: manifests/example
    repoURL: https://github.com/kevin-kho/example-manifest-deployment
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # If application is deleted, resource itself is deleted
  # finalizers:
  # - resources-finalizer.argocd.argoproj.io
  name: istio-manifest
  namespace: argocd
spec:
  destination:
    namespace: argocd # where the child app manifests will be created/applied
    name: in-cluster
  project: default
  source:
    path: manifests/istio
    repoURL: https://github.com/kevin-kho/example-manifest-deployment
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
